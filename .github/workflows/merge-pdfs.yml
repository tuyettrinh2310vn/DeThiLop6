name: Merge All PDFs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  merge-pdfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install PyPDF2
        run: pip install PyPDF2
      
      - name: Merge PDF files
        run: python .github/scripts/merge_pdfs.py
      
      - name: Commit and push merged PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Tong_hop_de_thi_lop_6.pdf
          git commit -m "Chore: Update merged PDF file" || echo "No changes to commit"
          git push || echo "Push failed"
